<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- ★ 카카오톡/인앱 브라우저 즉시 감지 - 가장 먼저 실행 ★ -->
    <script>
    (function() {
        var ua = navigator.userAgent || '';
        var isKakao = /KAKAOTALK/i.test(ua);
        var isLine = /Line\//i.test(ua);
        var isInsta = /Instagram/i.test(ua);
        var isFB = /FBAN|FBAV/i.test(ua);
        var isNaver = /NaverApp/i.test(ua);
        var isInApp = isKakao || isLine || isInsta || isFB || isNaver;

        if (!isInApp) return;

        var url = location.href;
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var isAndroid = /Android/i.test(ua);

        if (isKakao && isIOS) {
            // 카카오톡 iOS: openExternal 스킴으로 Safari에서 강제 열기
            location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
            return;
        }

        if (isKakao && isAndroid) {
            // 카카오톡 Android: intent 스킴으로 Chrome에서 강제 열기
            location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
                '#Intent;scheme=https;package=com.android.chrome;end';
            return;
        }

        if (isIOS) {
            // 기타 인앱 브라우저 iOS: document.location trick
            location.href = url;
        }

        if (isAndroid) {
            // 기타 인앱 브라우저 Android
            location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
                '#Intent;scheme=https;package=com.android.chrome;end';
        }
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Post 매일 원서 페이지 읽기. with 빛나는사람아</title>
    <meta name="description" content="매일 영어 원서 읽기 미션 트래커">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 카카오톡 인앱 브라우저 감지 배너 (자동 리다이렉트 실패 시 fallback) -->
    <div id="inapp-banner" style="display:none; position:fixed; top:0; left:0; right:0; z-index:9999; background:#FEE500; color:#181600; padding:14px 16px; box-shadow:0 2px 12px rgba(0,0,0,0.25); flex-direction:column; gap:10px; align-items:center;">
        <div style="font-size:15px; font-weight:800; text-align:center;">⚠️ 카카오톡에서는 구글 로그인이 안 됩니다</div>
        <div style="font-size:13px; font-weight:600; text-align:center; line-height:1.5;">아래 버튼을 눌러 외부 브라우저에서 열어주세요!</div>
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; width:100%;">
            <button id="open-external-btn" onclick="openInExternalBrowser()" style="background:#181600; color:#FEE500; border:none; border-radius:10px; padding:10px 20px; font-size:14px; font-weight:800; cursor:pointer; flex:1; max-width:160px;">🌐 외부 브라우저로</button>
            <button id="copy-url-btn" onclick="copyUrlToClipboard()" style="background:#fff; color:#181600; border:2px solid #181600; border-radius:10px; padding:10px 20px; font-size:14px; font-weight:800; cursor:pointer; flex:1; max-width:160px;">📋 주소 복사</button>
        </div>
        <div id="copy-success-msg" style="display:none; font-size:12px; font-weight:700; color:#1a6b00;">✅ 복사됨! Safari/Chrome에서 붙여넣기 해주세요</div>
    </div>
    <div class="background-decor">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <header>
        <div class="container">
            <h1 class="title">Post 매일 원서 <span class="accent">페이지 읽기</span></h1>
            <p class="subtitle">with 빛나는사람아</p>
            
            <div class="month-navigation">
                <button id="prev-month-btn" onclick="navigateMonth(-1)" class="nav-btn">◀ 저번달</button>
                <span id="current-month-label" class="current-month-label">2026년 7월</span>
                <button id="next-month-btn" onclick="navigateMonth(1)" class="nav-btn">다음달 ▶</button>
            </div>

            <div class="toolbar">
                <span id="user-info" class="user-info" style="display:none;"></span>
                <button id="auth-btn" onclick="toggleAuth()" class="google-btn">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo" class="google-icon">
                    <span id="auth-btn-text">구글 로그인</span>
                </button>
                <button id="add-participant-btn" onclick="showAddParticipantModal()" class="action-btn add-btn" style="display:none;">
                    <span class="icon">➕</span> <span>참가하기</span>
                </button>
                <button id="dark-toggle" onclick="toggleDarkMode()" class="theme-btn">
                    <span class="icon">🌙</span> <span id="dark-toggle-text">다크모드</span>
                </button>
                <button id="theme-toggle" onclick="toggleTheme()" class="theme-btn">
                    <span class="icon">🍇</span> <span>모드 변경</span>
                </button>
                <button id="stats-toggle" onclick="showStatsModal()" class="theme-btn">
                    <span class="icon">📊</span> <span>통계 보기</span>
                </button>
                <a href="admin.html" id="admin-link-btn" class="theme-btn" style="display:none; text-decoration:none;">
                    <span class="icon">⚙️</span> <span>Admin</span>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="readers-container" class="readers-grid">
            <!-- Dynamic content injected by JS -->
        </div>
    </main>

    <!-- 참가자 추가 모달 -->
    <div id="participant-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeParticipantModal()">✕</button>
            <h2 class="modal-title">챌린지 참가하기 🎉</h2>
            <p class="modal-desc">사용할 이름을 입력해주세요.<br>다른 참가자들에게 보이는 이름입니다.</p>
            <input type="text" id="participant-name-input" class="modal-input" placeholder="예: 홍길동" maxlength="20" 
                onkeydown="if(event.key==='Enter') confirmAddParticipant()">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeParticipantModal()">취소</button>
                <button class="modal-btn confirm" onclick="confirmAddParticipant()">참가하기</button>
            </div>
        </div>
    </div>

    <!-- 통계 모달 -->
    <div id="stats-modal" class="modal-overlay">
        <div class="modal-card stats-modal-card">
            <button class="modal-close" onclick="closeStatsModal()">✕</button>
            <h2 class="modal-title">📊 챌린지 통계</h2>
            
            <div class="stats-tabs">
                <button id="tab-monthly" class="stats-tab active" onclick="switchStatsTab('monthly')">월별</button>
                <button id="tab-quarterly" class="stats-tab" onclick="switchStatsTab('quarterly')">분기별</button>
                <button id="tab-yearly" class="stats-tab" onclick="switchStatsTab('yearly')">연별</button>
            </div>
            
            <div class="stats-filter-row">
                <select id="stats-period-select" class="modal-input stats-select" onchange="onStatsPeriodChange()">
                    <!-- Dynamically populated -->
                </select>
            </div>
            
            <div class="chart-container">
                <canvas id="statsChart"></canvas>
            </div>
            
            <div class="leaderboard-container">
                <h3 class="leaderboard-title">🏆 참여 현황</h3>
                <div class="leaderboard-wrap">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>참가자</th>
                                <th>원서</th>
                                <th>완료</th>
                                <th>달성률</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Dynamically populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Reading Challenge • Made for Book Lovers</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
